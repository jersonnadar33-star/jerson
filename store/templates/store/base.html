{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RIBA Store{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body>

<header class="navbar">
  <div class="container navbar-inner">
    <a href="{% url 'home' %}" class="logo">RIBA<span>Store</span></a>

    <form action="{% url 'home' %}" method="get" class="search-form">
      <input type="text" name="q" placeholder="Search products..." value="{{ query }}">
      <button type="submit" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>

    <a href="{% url 'cart_detail' %}" class="cart-link">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge">{{ cart_item_count }}</span>
    </a>
  </div>
</header>

{% if messages %}
<div class="container messages">
  {% for message in messages %}
    <div class="toast toast-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; {% now "Y" %} RIBAStore. Built with Django.</p>
  </div>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ duration: 700, once: true, easing: 'ease-out-cubic' });
</script>
<script src="{% static 'store/js/script.js' %}"></script>
</body>
</html>
